  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // Direct MP4 URLs

    const CAP_VIDEO = 'https://videos.pexels.com/video-files/5538825/5538825-hd_1920_1080_30fps.mp4';

    function fadeTo(video, target, durationMs, getRafRef) {
      const start = performance.now();
      const from = parseFloat(video.style.opacity) || 0;
      const delta = target - from;
      let rafId;
      const step = (now) => {
        const t = Math.min(1, (now - start) / durationMs);
        video.style.opacity = String(from + delta * t);
        if (t < 1) { rafId = requestAnimationFrame(step); getRafRef().current = rafId; }
        else { getRafRef().current = null; }
      };
      if (getRafRef().current != null) cancelAnimationFrame(getRafRef().current);
      rafId = requestAnimationFrame(step); getRafRef().current = rafId;
    }

    function FadingVideo({ src, className, style }) {
      const videoRef = useRef(null);
      const rafRef = useRef(null);
      const fadingOutRef = useRef(false);
      const getRafRef = useCallback(() => rafRef, []);

      useEffect(() => {
        const video = videoRef.current;
        if (!video) return;
        const FADE_MS = 800;
        const FADE_OUT_LEAD = 0.85;

        const onLoadedData = () => {
          video.style.opacity = '0';
          video.play().catch(() => {});
          fadeTo(video, 1, FADE_MS, getRafRef);
        };
        const onTimeUpdate = () => {
          const dur = video.duration;
          if (!dur || !isFinite(dur)) return;
          const remain = dur - video.currentTime;
          if (!fadingOutRef.current && remain <= FADE_OUT_LEAD && remain > 0) {
            fadingOutRef.current = true;
            fadeTo(video, 0, FADE_MS, getRafRef);
          }
        };
        const onEnded = () => {
          video.style.opacity = '0';
          setTimeout(() => {
            video.currentTime = 0;
            video.play().catch(() => {});
            fadingOutRef.current = false;
            fadeTo(video, 1, FADE_MS, getRafRef);
          }, 100);
        };

        video.addEventListener('loadeddata', onLoadedData);
        video.addEventListener('timeupdate', onTimeUpdate);
        video.addEventListener('ended', onEnded);
        return () => {
          if (rafRef.current != null) cancelAnimationFrame(rafRef.current);
          video.removeEventListener('loadeddata', onLoadedData);
          video.removeEventListener('timeupdate', onTimeUpdate);
          video.removeEventListener('ended', onEnded);
        };
      }, [src, getRafRef]);

      return <video ref={videoRef} src={src} className={className} style={{ opacity: 0, ...style }} autoPlay muted playsInline preload="auto" />;
    }

    // --- Enterprise Lucide Icons ---
    const Icon = ({ d, className }) => (

    const IcoDatabase = () => <Icon d={["M12 5c-4.418 0-8 1.343-8 3s3.582 3 8 3 8-1.343 8-3-3.582-3-8-3z", "M4 8v8c0 1.657 3.582 3 8 3s8-1.343 8-3V8"]} />;

    const IcoTrending = () => <Icon d={["M23 6l-9.5 9.5-5-5L1 18", "M17 6h6v6"]} />;

    const IcoClock = () => <Icon d={["M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20z", "M12 6v6l4 2"]} />;
    const IcoBuilding = () => <Icon d={["M4 22V6a2 2 0 0 1 2-2h4", "M14 20V2a2 2 0 0 1 2-2h4", "M4 10h4", "M4 16h4", "M14 6h4", "M14 12h4"]} />;

    // Animated Counter
    function AnimatedNumber({ value, suffix = "", duration = 2 }) {
      const [count, setCount] = useState(0);
      const ref = useRef(null);
      const inView = useInView(ref, { once: true, margin: "-100px" });

      useEffect(() => {
        if (!inView) return;
        let start = 0;
        const end = parseFloat(value);
        if (start === end) return;
        
        let startTime = null;
        const step = (timestamp) => {
          if (!startTime) startTime = timestamp;
          const progress = Math.min((timestamp - startTime) / (duration * 1000), 1);
          const easeOut = 1 - Math.pow(1 - progress, 3);
          setCount((end * easeOut).toFixed(value % 1 !== 0 ? 1 : 0));
          if (progress < 1) requestAnimationFrame(step);
        };
        requestAnimationFrame(step);
      }, [inView, value, duration]);

      return <span ref={ref}>{count}{suffix}</span>;
    }

          {/* KPIs */}

            </div>

          {/* Fake Chart */}

            <svg viewBox="0 0 400 100" className="w-full h-24 preserve-aspect-ratio-none" preserveAspectRatio="none">
              <defs>
                <linearGradient id="chartGrad" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stopColor="rgba(34,211,238,0.2)" />
                  <stop offset="100%" stopColor="rgba(34,211,238,0)" />
                </linearGradient>
              </defs>
              {/* Actual (Grey dashed) */}
              <path d="M0,80 Q50,60 100,70 T200,40 T300,50 T400,20" stroke="rgba(255,255,255,0.2)" strokeWidth="1.5" strokeDasharray="4 4" fill="none" />
              {/* Predicted (Cyan Glow) */}
              <path d="M0,85 Q50,65 100,68 T200,45 T300,48 T400,25" className="chart-line" />
              <path d="M0,85 Q50,65 100,68 T200,45 T300,48 T400,25 L400,100 L0,100 Z" className="chart-gradient" />
            </svg>
            {/* Tooltip Overlay */}
            <div className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-slate-800 border border-slate-700 px-2 py-1 rounded shadow-lg">
              <div className="text-[9px] text-slate-400">14:00</div>
              <div className="text-[11px] font-bold text-cyan-400">124 kWh</div>
            </div>
          </div>

          {/* Alert Strip */}
          <div className="mt-4 bg-orange-500/10 border border-orange-500/20 rounded-lg p-2.5 flex items-center justify-between">
            <div className="flex items-center gap-2">
              <IcoAlert className="w-4 h-4 text-orange-400" />

            </div>
            <button className="text-[10px] bg-orange-500/20 text-orange-300 px-2 py-1 rounded hover:bg-orange-500/30 transition-colors">Inspect</button>
          </div>
        </motion.div>

    }

                  Every Data Point <br/> Hides a <span className="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-green-400">Smarter Energy Decision.</span>
                </h1>
                
                <div className="w-12 h-1 bg-cyan-500 mb-6"></div>
                
                <p className="text-xl text-[#f8fafc] mb-12 max-w-[620px] font-semibold leading-[1.7] tracking-[0.015em] [text-shadow:0_2px_4px_rgba(0,0,0,0.8)]">

                  { i: IcoBarChart, t: "Real-Time Monitoring", d: "Live KPI tracking and visualization for immediate situational awareness." },
                  { i: IcoCpu, t: "Multi-Building Scale", d: "Manage hundreds of facilities through a single unified analytics fact table." },
                  { i: IcoShield, t: "Smart Recommendations", d: "Prescriptive insights to immediately rectify detected anomalies and save costs." }
                ].map((feat, idx) => (
                  <motion.div 
                    key={idx}
                    initial={{ opacity: 0, y: 20 }}
                    whileInView={{ opacity: 1, y: 0 }}
                    viewport={{ once: true }}
                    transition={{ delay: idx * 0.1 }}
                    className="liquid-glass p-8 rounded-2xl hover:-translate-y-2 transition-all duration-300 hover:border-cyan-500/50 hover:shadow-[0_15px_40px_rgba(34,211,238,0.15)] group flex flex-col h-full"
                  >
                    <div className="w-14 h-14 rounded-xl bg-slate-900 border border-slate-700 flex items-center justify-center mb-6 group-hover:border-cyan-500/50 group-hover:shadow-[0_0_15px_rgba(34,211,238,0.2)] transition-all">
                      <feat.i className="w-7 h-7 text-slate-300 group-hover:text-cyan-400 transition-colors" />
                    </div>
                    <h4 className="text-xl font-bold text-white mb-3">{feat.t}</h4>
                    <p className="text-sm text-slate-400 leading-relaxed flex-grow">{feat.d}</p>
                  </motion.div>
                ))}
              </div>
              
              <div className="mt-24 text-center">
                <button onClick={() => window.location.href = '/dashboard'} className="liquid-glass-strong inline-flex items-center gap-3 px-10 py-5 rounded-2xl text-white font-bold text-lg hover:-translate-y-1 hover:border-cyan-400/50 hover:shadow-[0_15px_30px_rgba(34,211,238,0.2)] transition-all">
                  Launch Platform Dashboard <IcoArrowRight className="w-6 h-6" />
                </button>
              </div>
            </div>
          </section>
        </div>
      );
    }
    
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
